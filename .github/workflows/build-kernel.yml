name: Build OPPO MT6893 Kernel
on:
  workflow_dispatch:

env:
  KERNEL_REPO: oppo-source/android_kernel_oppo_mt6893
  KERNEL_BRANCH: oppo/mt6893_14_14.0.0_reno8_5g
  DEFCONFIG: k6893v1_64_k419_defconfig
  ARCH: arm64
  CROSS_COMPILE: aarch64-linux-gnu-

jobs:
  build-kernel:
    name: Build OPPO MT6893 Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget tar xz-utils make gcc flex bison \
            libssl-dev libelf-dev bc python3 cpio rsync \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            clang-14 lld-14 llvm-14

      - name: Clone kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel
          fetch-depth: 1

      - name: Fix OPPO vendor symlinks and defconfig
        working-directory: kernel
        run: |
          set -e
          echo "=== Fixing all OPPO vendor symlinks ==="
          # Find all symlinks that point to ../../vendor/oplus or similar
          # and create stub target directories
          find . -type l -name '*' | while read link; do
            target=$(readlink "$link" 2>/dev/null || echo "")
            [ -z "$target" ] && continue
            # Only care about symlinks pointing to vendor/ or oplus/ paths
            case "$target" in
              *vendor/oplus*|*vendor/mediatek*|*oplus*)
                echo "Fix: $link -> $target"
                # Resolve target relative to link's directory
                dir="$(cd "$(dirname "$link")" && pwd)/$target"
                dir="$(realpath -m "$dir" 2>/dev/null || echo "$dir")"
                mkdir -p "$dir"
                # Create stub files for Kconfig and Makefile sources
                # Check if parent dir has Kconfig references
                if [ -f "$(dirname "$link")/Kconfig" ] || \
                   grep -q "$(basename "$link")" "$(dirname "$(dirname "$link")")/Kconfig" 2>/dev/null; then
                  touch "$dir/Kconfig"
                fi
                if [ -f "$(dirname "$link")/Makefile" ] || \
                   grep -q "$(basename "$link")" "$(dirname "$(dirname "$link")")/Makefile" 2>/dev/null; then
                  touch "$dir/Makefile"
                fi
                # Always create Kconfig and Makefile for safety
                touch "$dir/Kconfig" 2>/dev/null || true
                touch "$dir/Makefile" 2>/dev/null || true
                # If this is a file symlink (not dir), create stub file
                if [ ! -d "$link" ] && [ ! -d "$dir" ]; then
                  touch "$dir" 2>/dev/null || true
                fi
                ;;
            esac
          done
          echo "=== All symlinks fixed ==="
          # Ensure known vendor paths exist (belt and suspenders)
          for d in sched_assist klockopt sigkill_diagnosis; do
            mkdir -p "vendor/oplus/kernel/oplus_performance/$d"
            touch "vendor/oplus/kernel/oplus_performance/$d/Kconfig"
            touch "vendor/oplus/kernel/oplus_performance/$d/Makefile"
          done

          # Preprocess defconfig: remove #ifdef / #else / #endif / #CONFIG_ lines
          echo "=== Preprocessing defconfig ==="
          sed -i \
            -e '/^#ifdef /d' \
            -e '/^#ifndef /d' \
            -e '/^#else/d' \
            -e '/^#endif/d' \
            -e '/^\/\//d' \
            -e '/^#\*\*/d' \
            -e '/^#end/d' \
            -e '/^#CONFIG/s/^#CONFIG/# CONFIG/' \
            -e '/^#CONFIG/s/^#CONFIG/# CONFIG/' \
            arch/arm64/configs/${{ env.DEFCONFIG }}
          echo "=== Defconfig after preprocessing ==="
          grep -v '^#' arch/arm64/configs/${{ env.DEFCONFIG }} | grep -v '^$' | head -30

      - name: Configure kernel
        working-directory: kernel
        run: |
          # Try LLVM first, fall back to GCC
          make ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CC=clang-14 LD=ld.lld-14 AR=llvm-ar-14 NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 OBJDUMP=llvm-objdump-14 \
            READELF=llvm-readelf-14 STRIP=llvm-strip-14 \
            ${{ env.DEFCONFIG }} 2>&1 || \
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            ${{ env.DEFCONFIG }}

      - name: Build kernel
        working-directory: kernel
        run: |
          # Show config
          grep -E "^(CONFIG_KALLSYMS|CONFIG_KALLSYMS_ALL|CONFIG_IKCONFIG|CONFIG_IKCONFIG_PROC)=" .config || true
          echo "---"
          # Try LLVM first, fall back to GCC
          make ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CC=clang-14 LD=ld.lld-14 AR=llvm-ar-14 NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 OBJDUMP=llvm-objdump-14 \
            READELF=llvm-readelf-14 STRIP=llvm-strip-14 \
            -j$(nproc) 2>&1 || \
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            -j$(nproc)

      - name: Extract vmlinux and System.map
        working-directory: kernel
        run: |
          if [ -f vmlinux ]; then
            cp vmlinux ../vmlinux
            echo "vmlinux size: $(stat --format=%s ../vmlinux) bytes"
          fi
          if [ -f System.map ]; then
            cp System.map ../System.map
            echo "System.map lines: $(wc -l < ../System.map)"
          else
            nm vmlinux | sort > ../System.map
            echo "Generated System.map via nm, lines: $(wc -l < ../System.map)" 2>/dev/null || true
          fi

      - name: Generate sorted symbol listing
        working-directory: kernel
        run: |
          nm vmlinux | sort > ../nm_sorted.txt 2>/dev/null || true

      - name: Extract relevant exploit symbols
        working-directory: kernel
        run: |
          {
            echo "# Relevant Kernel Symbol Offsets for CVE-2026-43499"
            echo "# Generated: $(date -u)"
            echo "# Kernel: ${{ env.KERNEL_REPO }} branch ${{ env.KERNEL_BRANCH }}"
            echo "# Defconfig: ${{ env.DEFCONFIG }}"
            echo ""
            for sym in init_task kmalloc_caches security_hook_heads ashmem_fops; do
              addr=$(nm vmlinux 2>/dev/null | grep -E " $sym\$" | head -1 | awk '{print $1}')
              if [ -n "$addr" ]; then
                echo "$sym = 0x$addr"
              else
                echo "$sym = NOT_FOUND"
              fi
            done
            echo ""
            echo "# --- Full symbol listing ---"
            grep -E '\b(init_task|kmalloc_caches|security_hook_heads|ashmem_fops)\b' nm_sorted.txt 2>/dev/null || true
          } > ../relevant_symbols.txt
          cat ../relevant_symbols.txt

      - name: Upload vmlinux
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux
          path: vmlinux
          if-no-files-found: warn

      - name: Upload System.map
        uses: actions/upload-artifact@v4
        with:
          name: System.map
          path: System.map
          if-no-files-found: warn

      - name: Upload sorted symbols
        uses: actions/upload-artifact@v4
        with:
          name: nm_sorted.txt
          path: nm_sorted.txt
          if-no-files-found: warn

      - name: Upload relevant symbols
        uses: actions/upload-artifact@v4
        with:
          name: relevant_symbols.txt
          path: relevant_symbols.txt
          if-no-files-found: warn
