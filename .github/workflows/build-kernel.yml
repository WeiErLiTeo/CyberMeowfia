name: Build OPPO MT6893 Kernel
on:
  push:
  workflow_dispatch:

env:
  KERNEL_REPO: oppo-source/android_kernel_oppo_mt6893
  KERNEL_BRANCH: oppo/mt6893_14_14.0.0_reno8_5g
  VENDOR_REPO: dabao1955/android_kernel_OPPO_PEQM00
  VENDOR_BRANCH: oplus_vendor
  DEFCONFIG: k6893v1_64_k419_defconfig
  ARCH: arm64
  CROSS_COMPILE: aarch64-linux-gnu-

jobs:
  build-kernel:
    name: Build OPPO MT6893 Kernel
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget tar xz-utils make gcc flex bison \
            libssl-dev libelf-dev bc python3 cpio rsync \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            clang-14 lld-14 llvm-14

      - name: Clone kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel
          fetch-depth: 1

      - name: Clone OPPO vendor source
        working-directory: kernel
        run: |
          set -e
          echo "=== Clone vendor source (oplus + mediatek) ==="
          git clone https://github.com/${{ env.VENDOR_REPO }} \
            -b ${{ env.VENDOR_BRANCH }} vendor --depth=1
          echo "=== Copy vendor audio to kernel tree ==="
          if [ -d vendor/oplus/kernel_4.19/audio ]; then
            cp -r vendor/oplus/kernel_4.19/audio/* sound/soc/codecs/ 2>/dev/null || true
            echo "Copied vendor audio codecs"
          fi
          echo "=== Verify symlinks resolve ==="
          find . -type l -print 2>/dev/null | while read link; do
            if [ ! -e "$link" ]; then
              echo "WARNING: Broken symlink: $link -> $(readlink "$link")"
            fi
          done
          echo "Done."

      - name: Preprocess defconfig
        working-directory: kernel
        run: |
          echo "=== Preprocessing defconfig (remove #ifdef blocks) ==="
          sed -i \
            -e '/^#ifdef /d' \
            -e '/^#ifndef /d' \
            -e '/^#else/d' \
            -e '/^#endif/d' \
            -e '/^\/\//d' \
            -e '/^#\*\*/d' \
            -e '/^#end/d' \
            -e '/^#CONFIG/s/^#CONFIG/# CONFIG/' \
            arch/arm64/configs/${{ env.DEFCONFIG }}
          echo "=== Defconfig (non-comment lines) ==="
          grep -v '^#' arch/arm64/configs/${{ env.DEFCONFIG }} | grep -v '^$' | head -30

      - name: Configure kernel
        working-directory: kernel
        run: |
          # Try LLVM first, fall back to GCC
          make ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CC=clang-14 LD=ld.lld-14 AR=llvm-ar-14 NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 OBJDUMP=llvm-objdump-14 \
            READELF=llvm-readelf-14 STRIP=llvm-strip-14 \
            ${{ env.DEFCONFIG }} 2>&1 || \
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            ${{ env.DEFCONFIG }}

      - name: Build kernel
        working-directory: kernel
        run: |
          # Show config
          grep -E "^(CONFIG_KALLSYMS|CONFIG_KALLSYMS_ALL|CONFIG_IKCONFIG|CONFIG_IKCONFIG_PROC)=" .config || true
          echo "---"
          # Try LLVM first, fall back to GCC
          make ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CC=clang-14 LD=ld.lld-14 AR=llvm-ar-14 NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 OBJDUMP=llvm-objdump-14 \
            READELF=llvm-readelf-14 STRIP=llvm-strip-14 \
            -j$(nproc) 2>&1 || \
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            -j$(nproc)

      - name: Extract vmlinux and System.map
        working-directory: kernel
        run: |
          if [ -f vmlinux ]; then
            cp vmlinux ../vmlinux
            echo "vmlinux size: $(stat --format=%s ../vmlinux) bytes"
          fi
          if [ -f System.map ]; then
            cp System.map ../System.map
            echo "System.map lines: $(wc -l < ../System.map)"
          else
            nm vmlinux | sort > ../System.map
            echo "Generated System.map via nm, lines: $(wc -l < ../System.map)" 2>/dev/null || true
          fi

      - name: Generate sorted symbol listing
        working-directory: kernel
        run: |
          nm vmlinux | sort > ../nm_sorted.txt 2>/dev/null || true

      - name: Extract all exploit symbol offsets
        working-directory: kernel
        run: |
          KIMAGE_TEXT_BASE=0xffffff8008000000
          cat > ../symbol_offsets.txt << 'HEADER'
# =============================================================================
# SYMBOL OFFSETS for oppo-pgbm10 target.h
# Generated from built vmlinux at $(date -u)
# Offsets relative to KIMAGE_TEXT_BASE (0xffffff8008000000)
# Replace 0x00000000ULL /* [NEED VALUE] */ with these values
# =============================================================================
HEADER
          # Primary symbol lookup
          for sym in \
            ashmem_fops ashmem_ioctl ashmem_compat_ioctl \
            ashmem_mmap ashmem_open ashmem_release ashmem_show_fdinfo \
            configfs_read_iter configfs_bin_write_iter copy_splice_read \
            noop_llseek init_task root_task_group selinux_enforcing \
            security_hook_heads kmalloc_caches anon_pipe_buf_ops
          do
            addr=$(nm vmlinux 2>/dev/null | grep -E " $sym\$" | head -1 | awk '{print $1}')
            if [ -n "$addr" ]; then
              offset=$(( 0x$addr - KIMAGE_TEXT_BASE ))
              printf "%-45s 0x%08xULL\n" "#define ${sym}_OFF" "$offset" >> ../symbol_offsets.txt
            else
              echo "// ${sym}_OFF -> NOT_FOUND in vmlinux" >> ../symbol_offsets.txt
            fi
          done
          # ashmem_misc + offsetof(miscdevice.fops) = ashmem_misc + 0x10
          addr=$(nm vmlinux 2>/dev/null | grep -E " ashmem_misc\$" | head -1 | awk '{print $1}')
          if [ -n "$addr" ]; then
            misc_addr=$(( 0x$addr ))
            fops_addr=$(( misc_addr + 0x10 ))
            offset=$(( fops_addr - KIMAGE_TEXT_BASE ))
            printf "%-45s 0x%08xULL  // ashmem_misc + 0x10\n" "#define ashmem_misc_fops_OFF" "$offset" >> ../symbol_offsets.txt
            misc_offset=$(( misc_addr - KIMAGE_TEXT_BASE ))
            printf "%-45s 0x%08xULL  // raw ashmem_misc\n" "#define ashmem_misc_OFF" "$misc_offset" >> ../symbol_offsets.txt
          else
            echo "// ashmem_misc -> NOT_FOUND" >> ../symbol_offsets.txt
          fi
          # KASLR slide symbols (__start_rodata relative)
          for sym in nfulnl_logger random_boot_id_data sysctl_bootid; do
            addr=$(nm vmlinux 2>/dev/null | grep -E " $sym\$" | head -1 | awk '{print $1}')
            if [ -n "$addr" ]; then
              offset=$(( 0x$addr - KIMAGE_TEXT_BASE ))
              printf "%-45s 0x%08xULL\n" "#define slide_${sym}_OFF" "$offset" >> ../symbol_offsets.txt
            else
              echo "// slide_${sym}_OFF -> NOT_FOUND" >> ../symbol_offsets.txt
            fi
          done
          # loggers_0_1: try various names
          for sym in loggers nfulnl_logger_type loggers_0_1; do
            addr=$(nm vmlinux 2>/dev/null | grep -E " $sym\$" | head -1 | awk '{print $1}')
            if [ -n "$addr" ]; then
              offset=$(( 0x$addr - KIMAGE_TEXT_BASE ))
              printf "%-45s 0x%08xULL  // logged symbol as '$sym'\n" "#define slide_loggers_0_1_OFF" "$offset" >> ../symbol_offsets.txt
              break
            fi
          done
          cat ../symbol_offsets.txt
          echo ""
          echo "=== Context: nearby symbols ==="
          grep -E '\b(ashmem|configfs|splice_read|noop_llseek|init_task|root_task_group|selinux_enforcing|security_hook_heads|kmalloc_caches|anon_pipe_buf|nfulnl|logger|bootid|boot_id|loggers)\b' \
            nm_sorted.txt 2>/dev/null | head -50

      - name: Upload vmlinux
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux
          path: vmlinux
          if-no-files-found: warn

      - name: Upload System.map
        uses: actions/upload-artifact@v4
        with:
          name: System.map
          path: System.map
          if-no-files-found: warn

      - name: Upload sorted symbols
        uses: actions/upload-artifact@v4
        with:
          name: nm_sorted.txt
          path: nm_sorted.txt
          if-no-files-found: warn

      - name: Upload symbol offsets
        uses: actions/upload-artifact@v4
        with:
          name: symbol_offsets.txt
          path: symbol_offsets.txt
          if-no-files-found: warn
