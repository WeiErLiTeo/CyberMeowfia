name: Build OPPO MT6893 Kernel
on: push
env:
  KERNEL_REPO: oppo-source/android_kernel_oppo_mt6893
  KERNEL_BRANCH: oppo/mt6893_14_14.0.0_reno8_5g
  VENDOR_REPO: dabao1955/android_kernel_OPPO_PEQM00
  VENDOR_BRANCH: oplus_vendor
  DEFCONFIG: k6893v1_64_k419_defconfig
  ARCH: arm64
  CROSS_COMPILE: aarch64-linux-gnu-
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget tar xz-utils make gcc flex bison \
            libssl-dev libelf-dev bc python3 cpio rsync \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            clang-14 lld-14 llvm-14
      - name: Checkout kernel
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel
          fetch-depth: 1
      - name: Clone vendor
        working-directory: kernel
        run: |
          set -e
          git clone https://github.com/${{ env.VENDOR_REPO }} \
            -b ${{ env.VENDOR_BRANCH }} vendor --depth=1
          if [ -d vendor/oplus/kernel_4.19/audio ]; then
            cp -r vendor/oplus/kernel_4.19/audio/* sound/soc/codecs/ 2>/dev/null || true
          fi
      - name: Preprocess defconfig
        working-directory: kernel
        run: |
          sed -i \
            -e '/^#ifdef /d' -e '/^#ifndef /d' -e '/^#else/d' -e '/^#endif/d' \
            -e '/^\/\//d' -e '/^#\*\*/d' -e '/^#end/d' \
            -e '/^#CONFIG/s/^#CONFIG/# CONFIG/' \
            arch/arm64/configs/${{ env.DEFCONFIG }}
      - name: Configure kernel
        working-directory: kernel
        continue-on-error: true
        run: |
          make ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CC=clang-14 LD=ld.lld-14 AR=llvm-ar-14 NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 OBJDUMP=llvm-objdump-14 \
            READELF=llvm-readelf-14 STRIP=llvm-strip-14 \
            ${{ env.DEFCONFIG }} 2>&1 || \
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            ${{ env.DEFCONFIG }}
      - name: Build kernel
        working-directory: kernel
        continue-on-error: true
        run: |
          make ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CC=clang-14 LD=ld.lld-14 AR=llvm-ar-14 NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 OBJDUMP=llvm-objdump-14 \
            READELF=llvm-readelf-14 STRIP=llvm-strip-14 \
            -j$(nproc) 2>&1 || \
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            -j$(nproc)
      - name: Extract vmlinux
        if: always()
        working-directory: kernel
        run: |
          if [ -f vmlinux ]; then
            cp vmlinux ../vmlinux
          fi
          if [ -f System.map ]; then
            cp System.map ../System.map
          else
            nm vmlinux | sort > ../System.map 2>/dev/null || true
          fi
      - name: Symbol offsets
        if: always()
        working-directory: kernel
        run: |
          KIMAGE_BASE=0xffffff8008000000
          cat > ../symbol_offsets.txt << 'HEADER'
# Symbol offsets for oppo-pgbm10 (PGBM10 / OPPO Reno8 5G / MT6893)
# Generated from built vmlinux
# Offsets from KIMAGE_TEXT_BASE (0xffffff8008000000)
HEADER
          extract() {
            local sym=$1 label=$2
            local addr=$(nm vmlinux 2>/dev/null | grep -E " $sym$" | head -1 | awk '{print $1}')
            if [ -n "$addr" ]; then
              local off=$(( 0x$addr - KIMAGE_BASE ))
              printf "#define %-40s 0x%08xULL\n" "${label}" "$off" >> ../symbol_offsets.txt
            else
              echo "// ${label} -> NOT_FOUND" >> ../symbol_offsets.txt
            fi
          }
          extract ashmem_fops ashmem_fops_OFF
          extract ashmem_ioctl ashmem_ioctl_OFF
          extract ashmem_compat_ioctl ashmem_compat_ioctl_OFF
          extract ashmem_mmap ashmem_mmap_OFF
          extract ashmem_open ashmem_open_OFF
          extract ashmem_release ashmem_release_OFF
          extract ashmem_show_fdinfo ashmem_show_fdinfo_OFF
          extract configfs_read_iter configfs_read_iter_OFF
          extract configfs_bin_write_iter configfs_bin_write_iter_OFF
          extract copy_splice_read copy_splice_read_OFF
          extract noop_llseek noop_llseek_OFF
          extract init_task init_task_OFF
          extract root_task_group root_task_group_OFF
          extract selinux_enforcing selinux_enforcing_OFF
          extract security_hook_heads security_hook_heads_OFF
          extract kmalloc_caches kmalloc_caches_OFF
          extract anon_pipe_buf_ops anon_pipe_buf_ops_OFF
          # ashmem_misc_fops = ashmem_misc + 0x10
          local addr=$(nm vmlinux 2>/dev/null | grep -E " ashmem_misc$" | head -1 | awk '{print $1}')
          if [ -n "$addr" ]; then
            local misc_off=$(( 0x$addr - KIMAGE_BASE ))
            local fops_off=$(( misc_off + 0x10 ))
            printf "#define %-40s 0x%08xULL  // ashmem_misc + 0x10\n" "ashmem_misc_fops_OFF" "$fops_off" >> ../symbol_offsets.txt
            printf "#define %-40s 0x%08xULL\n" "ashmem_misc_OFF" "$misc_off" >> ../symbol_offsets.txt
          else
            echo "// ashmem_misc_fops_OFF -> NOT_FOUND" >> ../symbol_offsets.txt
          fi
          extract nfulnl_logger slide_nfulnl_logger_OFF
          extract random_boot_id_data slide_random_boot_id_data_OFF
          extract sysctl_bootid slide_sysctl_bootid_OFF
          for sym in loggers nfulnl_logger_type loggers_0_1; do
            local addr=$(nm vmlinux 2>/dev/null | grep -E " $sym$" | head -1 | awk '{print $1}')
            if [ -n "$addr" ]; then
              local off=$(( 0x$addr - KIMAGE_BASE ))
              printf "#define %-40s 0x%08xULL  // found as '%s'\n" "slide_loggers_0_1_OFF" "$off" "$sym" >> ../symbol_offsets.txt
              break
            fi
          done
          cat ../symbol_offsets.txt
      - name: Upload symbol offsets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: symbol_offsets.txt
          path: symbol_offsets.txt
          if-no-files-found: warn
      - name: Upload vmlinux
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux
          path: vmlinux
          if-no-files-found: warn
      - name: Upload System.map
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: System.map
          path: System.map
          if-no-files-found: warn
